kind = "web"
previewPath = "/"
title = "The Newborn Tracker"
version = "1.0.0"
id = "artifacts/newborn-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21639

[services.development]
run = "pnpm --filter @workspace/newborn-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/newborn-tracker", "run", "build" ]
publicDir = "artifacts/newborn-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21639"
BASE_PATH = "/"
