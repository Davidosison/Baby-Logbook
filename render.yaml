services:
  - name: baby-logbook
    type: web
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_FAMILY_PIN
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
